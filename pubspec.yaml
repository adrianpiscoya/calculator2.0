name: calculator_scientific

description: Calculadora científica moderna para Android en Flutter.

publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  math_expressions: ^2.4.0
  flutter_math_fork: ^0.7.4  # Para renderizar fracciones matemáticas hermosas
  flutter_plot: ^0.1.0 # Opcional, para Gráfico de Funciones
  neumorphic_ui: ^1.0.0
  audioplayers: ^6.0.0
  provider: ^6.1.5+1
  fl_chart: ^1.1.0
  share_plus: ^7.2.1
  http: ^0.13.6
  # video_player removed: no usamos video local para recompensas, evita peso y WebView lenta
  shared_preferences: ^2.5.3
  flutter_simple_calculator: ^2.3.0
  permission_handler: ^12.0.1
  google_mobile_ads: ^5.1.0
  url_launcher: ^6.2.4
  # 🌍 INTERNACIONALIZACIÓN: Implementación simple sin conflictos
  flutter_localizations:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf
  assets:
    - assets/click.mp3
    - assets/retro_bg.png
    # Include entire buttons folder to avoid missing-asset issues during testing
    - assets/buttons/
    - assets/translations/  # 🌍 TRADUCCIONES
  # - assets/videos/bunny_small.mp4  # eliminado: ya no usamos el video local

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Diseña un cuarto íco.png"
  background_color: "#000000"  # Fondo negro en lugar de blanco
  remove_alpha_ios: true       # Quita transparencia en iOS
  adaptive_icon_background: "#000000"  # Fondo negro para Android adaptativo
  adaptive_icon_foreground: "assets/Diseña un cuarto íco.png"
